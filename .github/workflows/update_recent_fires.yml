name: Update recent FIRMS active-fire data

on:
  schedule:
    - cron: "37 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-recent-fires:
    runs-on: ubuntu-latest

    env:
      FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch recent FIRMS detections
        run: |
          python fetch_firms.py --recent --source VIIRS_SNPP_NRT

      - name: Show updated data files
        run: |
          ls -lh data/active_fire || true

      - name: Commit updated recent snapshot
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/active_fire/firms_viirs_snpp_nrt_recent.parquet

          git commit -m "Update recent FIRMS active-fire snapshot" || echo "No data changes to commit"
          git push